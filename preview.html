<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vivaldi Dynamic Island – Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 0;
      overflow: hidden;
    }

    /* ────────────── FAKE BROWSER BAR ────────────── */
    .browser-bar {
      width: 100%;
      height: 52px;
      background: rgba(15, 12, 41, 0.95);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 10px;
      position: relative;
      flex-shrink: 0;
    }
    .browser-dots { display: flex; gap: 6px; }
    .browser-dots span {
      width: 11px; height: 11px; border-radius: 50%;
      background: rgba(255,255,255,0.12);
    }
    .browser-dots span:nth-child(1) { background: #ff5f57; }
    .browser-dots span:nth-child(2) { background: #ffbd2e; }
    .browser-dots span:nth-child(3) { background: #28ca41; }
    .address-bar {
      flex: 1;
      height: 28px;
      background: rgba(255,255,255,0.06);
      border-radius: 14px;
      display: flex;
      align-items: center;
      padding: 0 14px;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
    }

    /* ────────────── DYNAMIC ISLAND ────────────── */
    #dynamic-island {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;

      background: #000;
      border-radius: 32px;
      cursor: pointer;
      overflow: hidden;

      /* collapsed state */
      width: 148px;
      height: 32px;

      transition:
        width 0.55s cubic-bezier(0.32, 0.72, 0, 1),
        height 0.55s cubic-bezier(0.32, 0.72, 0, 1),
        border-radius 0.55s cubic-bezier(0.32, 0.72, 0, 1);

      box-shadow:
        0 0 0 1px rgba(255,255,255,0.08),
        0 8px 32px rgba(0,0,0,0.7),
        0 0 60px rgba(99,102,241,0.15);
    }

    #dynamic-island:hover,
    #dynamic-island.expanded {
      width: 380px;
      height: 120px;
      border-radius: 26px;
    }

    /* ── Collapsed pill content ── */
    .island-collapsed {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 14px;
      opacity: 1;
      transition: opacity 0.2s ease;
    }
    #dynamic-island:hover .island-collapsed,
    #dynamic-island.expanded .island-collapsed {
      opacity: 0;
      pointer-events: none;
    }

    .collapsed-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #6366f1;
      animation: pulse-dot 2s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .collapsed-track {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    .collapsed-track-inner {
      white-space: nowrap;
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,0.85);
      animation: scroll-text 8s linear infinite;
      display: inline-block;
    }
    @keyframes scroll-text {
      0%   { transform: translateX(0); }
      30%  { transform: translateX(0); }
      70%  { transform: translateX(-60%); }
      100% { transform: translateX(0); }
    }

    .collapsed-play-icon {
      width: 18px; height: 18px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .collapsed-play-icon svg { width: 10px; height: 10px; }

    /* ── Expanded content ── */
    .island-expanded {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      padding: 14px 16px;
      gap: 14px;
      opacity: 0;
      transform: scale(0.92);
      transition: opacity 0.3s ease 0.15s, transform 0.3s ease 0.15s;
      pointer-events: none;
    }
    #dynamic-island:hover .island-expanded,
    #dynamic-island.expanded .island-expanded {
      opacity: 1;
      transform: scale(1);
      pointer-events: all;
    }

    /* Album art */
    .album-art {
      width: 72px;
      height: 72px;
      border-radius: 14px;
      flex-shrink: 0;
      overflow: hidden;
      position: relative;
      background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
      box-shadow: 0 4px 20px rgba(99,102,241,0.4);
    }
    .album-art-inner {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    .album-art svg { width: 32px; height: 32px; color: rgba(255,255,255,0.7); }
    .album-spin {
      position: absolute;
      inset: 0;
      border-radius: 14px;
      border: 2px solid transparent;
      background: linear-gradient(#000, #000) padding-box,
                  linear-gradient(0deg, #6366f1, transparent) border-box;
      animation: rotate-border 3s linear infinite;
    }
    @keyframes rotate-border {
      to { transform: rotate(360deg); }
    }

    /* Track info + controls */
    .track-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 0;
    }

    .track-meta {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .track-title {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .track-artist {
      font-size: 11px;
      font-weight: 400;
      color: rgba(255,255,255,0.45);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Progress */
    .progress-container {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .progress-time {
      font-size: 9px;
      color: rgba(255,255,255,0.3);
      white-space: nowrap;
      min-width: 26px;
    }
    .progress-bar {
      flex: 1;
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 99px;
      overflow: hidden;
      cursor: pointer;
    }
    .progress-fill {
      height: 100%;
      width: 38%;
      background: linear-gradient(90deg, #6366f1, #a855f7);
      border-radius: 99px;
      position: relative;
      transition: width 0.3s linear;
    }
    .progress-fill::after {
      content: '';
      position: absolute;
      right: -3px;
      top: 50%;
      transform: translateY(-50%);
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 6px rgba(99,102,241,0.8);
    }

    /* Controls row */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .ctrl-btn {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.15s;
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.7);
    }
    .ctrl-btn:hover {
      background: rgba(255,255,255,0.12);
      color: #fff;
      transform: scale(1.08);
    }
    .ctrl-btn:active { transform: scale(0.94); }
    .ctrl-btn svg { width: 14px; height: 14px; }

    .ctrl-btn.play-pause {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      color: #fff;
      box-shadow: 0 4px 14px rgba(99,102,241,0.5);
    }
    .ctrl-btn.play-pause:hover {
      background: linear-gradient(135deg, #818cf8, #c084fc);
      transform: scale(1.1);
    }
    .ctrl-btn.play-pause svg { width: 16px; height: 16px; }

    /* ── Page content below ── */
    .page-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: rgba(255,255,255,0.2);
      font-size: 13px;
      padding: 40px 20px;
    }
    .hint-badge {
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 999px;
      padding: 6px 16px;
      font-size: 12px;
      color: rgba(99,102,241,0.9);
    }
  </style>
</head>
<body>

  <!-- Simulated browser chrome -->
  <div class="browser-bar">
    <div class="browser-dots">
      <span></span><span></span><span></span>
    </div>
    <div class="address-bar">youtube.com/watch?v=…</div>

    <!-- THE DYNAMIC ISLAND -->
    <div id="dynamic-island">

      <!-- Collapsed view -->
      <div class="island-collapsed">
        <div class="collapsed-dot"></div>
        <div class="collapsed-track">
          <span class="collapsed-track-inner">Lofi Girl – beats to relax / study to</span>
        </div>
        <div class="collapsed-play-icon">
          <svg viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>

      <!-- Expanded view -->
      <div class="island-expanded">
        <!-- Album art -->
        <div class="album-art">
          <div class="album-art-inner">
            <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
            </svg>
          </div>
        </div>

        <!-- Track section -->
        <div class="track-section">
          <div class="track-meta">
            <div class="track-title">beats to relax / study to</div>
            <div class="track-artist">Lofi Girl · YouTube</div>
          </div>

          <div class="progress-container">
            <span class="progress-time">1:24</span>
            <div class="progress-bar" id="progress-bar">
              <div class="progress-fill" id="progress-fill"></div>
            </div>
            <span class="progress-time" style="text-align:right">3:42</span>
          </div>

          <div class="controls">
            <button class="ctrl-btn" id="btn-prev" title="Previous">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
            </button>
            <button class="ctrl-btn play-pause" id="btn-play" title="Play/Pause">
              <svg viewBox="0 0 24 24" fill="currentColor" id="play-icon"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <button class="ctrl-btn" id="btn-next" title="Next">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2-8.14 5.12 3.64L8 17.14V9.86zM16 6h2v12h-2z"/></svg>
            </button>
          </div>
        </div>
      </div>

    </div><!-- /#dynamic-island -->
  </div>

  <div class="page-content">
    <div class="hint-badge">↑ Hover the island above to expand</div>
    <p>This is a preview of the Vivaldi Dynamic Island mod</p>
  </div>

  <script>
    const island = document.getElementById('dynamic-island');
    const playIcon = document.getElementById('play-icon');
    const progressFill = document.getElementById('progress-fill');
    let isPlaying = true;
    let progress = 38;
    let progressInterval;

    const playIconSVG  = `<path d="M8 5v14l11-7z"/>`;
    const pauseIconSVG = `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`;

    function startProgress() {
      progressInterval = setInterval(() => {
        if (isPlaying) {
          progress = Math.min(100, progress + 0.05);
          progressFill.style.width = progress + '%';
        }
      }, 100);
    }
    startProgress();

    document.getElementById('btn-play').addEventListener('click', (e) => {
      e.stopPropagation();
      isPlaying = !isPlaying;
      playIcon.innerHTML = isPlaying ? pauseIconSVG : playIconSVG;
    });

    document.getElementById('btn-prev').addEventListener('click', (e) => {
      e.stopPropagation();
      progress = 0;
      progressFill.style.width = '0%';
    });

    document.getElementById('btn-next').addEventListener('click', (e) => {
      e.stopPropagation();
      progress = 0;
      progressFill.style.width = '0%';
    });

    document.getElementById('progress-bar').addEventListener('click', (e) => {
      const rect = e.currentTarget.getBoundingClientRect();
      progress = ((e.clientX - rect.left) / rect.width) * 100;
      progressFill.style.width = progress + '%';
    });
  </script>
</body>
</html>
